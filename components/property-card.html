<template id="property-card-template">
  <article class="property-card h-100" role="article" aria-label="Property Listing Card">
    <div class="property-img-wrap">
      <span class="property-badge badge-featured">Featured</span>
      <span class="type-badge">Residential</span>
      <img src="" alt="Property image" loading="lazy" />
    </div>
    <div class="p-3">
      <h3 class="h5 property-title mb-1"></h3>
      <p class="property-meta mb-1"></p>
      <p class="property-price mb-1"></p>
      <p class="property-compact mb-3"></p>
      <div class="d-flex flex-wrap gap-2">
        <button type="button" class="btn btn-gold btn-sm view-details-btn">View Details</button>
        <a class="btn btn-outline-gold btn-sm whatsapp-enquiry-btn" target="_blank" rel="noopener noreferrer">WhatsApp Enquiry</a>
      </div>
    </div>
  </article>
</template>
