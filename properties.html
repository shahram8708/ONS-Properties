<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ahmedabad Property Listings by ONS Properties</title>
  <meta name="description" content="Browse verified residential and commercial properties in Ahmedabad with smart filters for type, BHK, location, and budget. Enquire instantly with ONS Properties." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://onsproperties.in/properties.html" />
  <meta property="og:title" content="Ahmedabad Property Listings by ONS Properties" />
  <meta property="og:description" content="Find apartments, plots, and office spaces in Ahmedabad with trusted support from ONS Properties." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://onsproperties.in/properties.html" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="192x192" href="img/logo.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="img/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>
  <header>
    <div id="navbar-placeholder"></div>
  </header>

  <main id="main-content">
    <section class="page-hero">
      <div class="container">
        <h1 class="mb-2">Ahmedabad Properties</h1>
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a href="index.html">Home</a></li>
            <li class="breadcrumb-item active" aria-current="page">Properties</li>
          </ol>
        </nav>
      </div>
    </section>

    <section class="section-padding">
      <div class="container">
        <div class="contact-wrap p-3 p-md-4 mb-4 reveal-on-scroll">
          <div class="row g-3 align-items-end">
            <div class="col-12 col-md-6 col-lg-3">
              <label for="filter-type" class="form-label">Property Type</label>
              <select id="filter-type" class="form-select">
                <option value="All">All</option>
                <option value="Residential">Residential</option>
                <option value="Commercial">Commercial</option>
              </select>
            </div>
            <div class="col-12 col-md-6 col-lg-2">
              <label for="filter-bhk" class="form-label">BHK</label>
              <select id="filter-bhk" class="form-select">
                <option value="All">All</option>
                <option value="1BHK">1BHK</option>
                <option value="2BHK">2BHK</option>
                <option value="3BHK">3BHK</option>
                <option value="4BHK+">4BHK+</option>
              </select>
            </div>
            <div class="col-12 col-md-6 col-lg-3">
              <label for="filter-location" class="form-label">Location</label>
              <select id="filter-location" class="form-select">
                <option value="All">All</option>
                <option value="Prahlad Nagar">Prahlad Nagar</option>
                <option value="Bopal">Bopal</option>
                <option value="Satellite">Satellite</option>
                <option value="Vastrapur">Vastrapur</option>
                <option value="Thaltej">Thaltej</option>
                <option value="SG Highway">SG Highway</option>
                <option value="South Bopal">South Bopal</option>
                <option value="Gota">Gota</option>
              </select>
            </div>
            <div class="col-12 col-md-6 col-lg-2">
              <label for="filter-budget" class="form-label">Budget</label>
              <select id="filter-budget" class="form-select">
                <option value="All">All</option>
                <option value="under50">Under 50L</option>
                <option value="50to75">50 to 75L</option>
                <option value="75to1cr">75L to 1Cr</option>
                <option value="above1cr">Above 1Cr</option>
              </select>
            </div>
            <div class="col-12 col-md-6 col-lg-2">
              <button class="btn btn-gold w-100" id="filter-search-btn" type="button">Search</button>
            </div>
          </div>
        </div>

        <p class="result-count mb-3" id="results-count">Showing 0 of 0 properties</p>

        <div class="row g-4" id="properties-grid"></div>

        <div class="text-center mt-4">
          <button id="load-more-btn" type="button" class="btn btn-outline-gold">Load More</button>
        </div>
      </div>
    </section>
  </main>

  <div class="modal fade" id="propertyDetailModal" tabindex="-1" aria-labelledby="modal-property-title" aria-modal="true" role="dialog">
    <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="h4 mb-0" id="modal-property-title">Property Details</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="row g-4">
            <div class="col-12 col-lg-6">
              <img id="modal-property-image" src="" alt="Property image" class="w-100 rounded-4" loading="lazy" />
            </div>
            <div class="col-12 col-lg-6">
              <span class="type-badge position-static mb-2 d-inline-block" id="modal-property-type"></span>
              <p class="property-meta"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a7 7 0 0 0-7 7c0 4.93 7 13 7 13s7-8.07 7-13a7 7 0 0 0-7-7m0 9.5A2.5 2.5 0 1 1 14.5 9 2.5 2.5 0 0 1 12 11.5"></path></svg><span id="modal-property-location"></span></p>
              <p class="property-price" id="modal-property-price"></p>
              <p class="property-compact" id="modal-property-size"></p>
              <p id="modal-property-description"></p>
              <div id="modal-property-features" class="d-flex flex-wrap"></div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <a id="modal-whatsapp-btn" class="btn btn-gold" target="_blank" rel="noopener noreferrer">WhatsApp Enquiry</a>
          <button type="button" class="btn btn-outline-gold" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <div id="whatsapp-placeholder"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" ></script>
  <script type="module" defer src="js/components.js"></script>
  <script type="module" defer src="js/properties.js"></script>
  <script type="module" defer src="js/animations.js"></script>
</body>
</html>
